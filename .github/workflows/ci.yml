name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prove, build, and run in Rocq image
        uses: coq-community/docker-coq-action@v1
        with:
          coq_version: '9.0'
          ocaml_version: 'default'
          before_install: ''
          install: ''
          after_install: ''
          before_script: |
            startGroup "Fix workspace permissions"
              sudo chown -R 1000:1000 .
            endGroup
          script: |
            startGroup "Prove and extract"
              rocq compile MicroGPT.v
            endGroup
            startGroup "Build OCaml executable"
              ocamlopt -c microgpt_extracted.mli
              ocamlopt -c microgpt_extracted.ml
              ocamlopt -c main.ml
              ocamlopt microgpt_extracted.cmx main.cmx -o microgpt_demo
            endGroup
            startGroup "Run executable"
              ./microgpt_demo data/demo_corpus.txt | tee demo_output.txt
              grep -q '^demo1$' demo_output.txt
              grep -q '^formal_train_demo$' demo_output.txt
              grep -q '^formal_full_model_demo$' demo_output.txt
              grep -q '^  initial_prediction=' demo_output.txt
              grep -q '^  sgd_prediction_1=' demo_output.txt
              grep -q '^  sgd_top_k=' demo_output.txt
              grep -q '^  sgd_top_p=' demo_output.txt
              grep -q '^  adam_prediction_2=' demo_output.txt
              grep -q '^runtime_train_demo$' demo_output.txt
              grep -q '^  corpus_source=\"data/demo_corpus.txt\"' demo_output.txt
              grep -q '^  initial_runtime_loss=' demo_output.txt
              grep -q '^  final_runtime_loss=' demo_output.txt
              grep -q '^  initial_top_p=' demo_output.txt
              grep -q '^  final_top_p=' demo_output.txt
              grep -q '^runtime_full_model_train_demo$' demo_output.txt
              grep -q '^  initial_full_model_loss=' demo_output.txt
              grep -q '^  final_full_model_loss=' demo_output.txt
              grep -q '^  initial_full_model_prediction=' demo_output.txt
              grep -q '^  final_full_model_prediction=' demo_output.txt
              initial=$(grep '^  initial_runtime_loss=' demo_output.txt | cut -d= -f2)
              final=$(grep '^  final_runtime_loss=' demo_output.txt | cut -d= -f2)
              awk -v initial="$initial" -v final="$final" 'BEGIN { exit !(final < initial) }'
              initial_full=$(grep '^  initial_full_model_loss=' demo_output.txt | cut -d= -f2)
              final_full=$(grep '^  final_full_model_loss=' demo_output.txt | cut -d= -f2)
              awk -v initial="$initial_full" -v final="$final_full" 'BEGIN { exit !(final < initial) }'
            endGroup
            startGroup "Run sectioned executable paths"
              MICROGPT_SECTION=runtime_head ./microgpt_demo data/demo_corpus.txt | tee runtime_head_output.txt
              grep -q '^runtime_train_demo$' runtime_head_output.txt
              if grep -q '^demo1$' runtime_head_output.txt; then exit 1; fi
              MICROGPT_SECTION=runtime_full ./microgpt_demo data/demo_corpus.txt | tee runtime_full_output.txt
              grep -q '^runtime_full_model_train_demo$' runtime_full_output.txt
              if grep -q '^runtime_train_demo$' runtime_full_output.txt; then exit 1; fi
            endGroup
          uninstall: ''
